apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-gateway
  namespace: aiops
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ingest-gateway
  template:
    metadata:
      labels:
        app: ingest-gateway
    spec:
      containers:
        - name: ingest-gateway
          image: ghcr.io/example/aiops-agent:latest
          command: ["uvicorn", "services.ingest_gateway.main:app", "--host", "0.0.0.0", "--port", "8001"]
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: aiops-config
            - secretRef:
                name: aiops-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
---
