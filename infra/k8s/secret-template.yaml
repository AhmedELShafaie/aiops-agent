apiVersion: v1
kind: Secret
metadata:
  name: aiops-secrets
  namespace: aiops
type: Opaque
stringData:
  REDIS_URL: "redis://redis.aiops.svc.cluster.local:6379/0"
  AUDIT_DB_URL: "sqlite+aiosqlite:///data/aiops_audit.db"
  ALLOWED_RUNBOOKS: "restart_service,clear_tmp,restart_agent"
  SLACK_SIGNING_SECRET: "replace-me"
  SLACK_BOT_TOKEN: "replace-me"
