# Central AIOps reverse proxy (Nginx/OpenResty)
# Place as: /etc/nginx/conf.d/aiops-central.conf
#
# IMPORTANT:
# - Replace placeholder values before production use.
# - If not using OpenResty/lua module, comment out lua_access_by_lua_file.

upstream aiops_ingest_gateway {
    server 127.0.0.1:8001;
    keepalive 64;
}

upstream aiops_approval_orchestrator {
    server 127.0.0.1:8004;
    keepalive 32;
}

# API key check map
map $http_x_api_key $api_key_valid {
    default 0;
    # Replace with strong random key. Rotate regularly.
    "REPLACE_WITH_STRONG_API_KEY" 1;
}

# Source allowlist for monitoring systems only.
geo $trusted_source {
    default 0;
    10.0.0.0/8 1;
    172.16.0.0/12 1;
    192.168.0.0/16 1;
    # Add public fixed egress IPs for SaaS monitoring vendors if needed.
    # 203.0.113.10/32 1;
}

limit_req_zone $binary_remote_addr zone=aiops_ingest_rl:10m rate=50r/s;
limit_conn_zone $binary_remote_addr zone=aiops_conn_rl:10m;

server {
    listen 80;
    server_name aiops.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aiops.example.com;

    ssl_certificate /etc/letsencrypt/live/aiops.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiops.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 1m;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;

    # Health endpoint can remain private or allow internal checks only.
    location = /health {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://aiops_ingest_gateway/health;
    }

    # Ingestion API protection (target endpoint for monitoring systems).
    location ~ ^/ingest(?:/source/[^/]+)?$ {
        if ($trusted_source = 0) { return 403; }
        if ($api_key_valid = 0) { return 401; }

        # Optional HMAC verification for request integrity.
        # Requires OpenResty (or nginx + lua module) and file from this repo.
        # Expected headers:
        #   X-Signature-Timestamp: unix epoch
        #   X-Signature: hex HMAC-SHA256 over "<timestamp>.<raw_body>"
        # HMAC secret path defaults to /etc/nginx/secrets/aiops_hmac_secret.
        lua_access_by_lua_file /etc/nginx/lua/hmac_access.lua;

        limit_req zone=aiops_ingest_rl burst=100 nodelay;
        limit_conn aiops_conn_rl 30;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://aiops_ingest_gateway;
    }

    # Slack callbacks must remain reachable from Slack IPs/public internet.
    # Do NOT protect this endpoint with source allowlist or API key.
    # Slack signature validation is enforced in approval-orchestrator service.
    location = /slack/actions {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://aiops_approval_orchestrator/slack/actions;
    }

    # Block all other paths by default on this edge endpoint.
    location / {
        return 404;
    }
}
